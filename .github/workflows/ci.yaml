name: CI

permissions:
  contents: read
  pull-requests: write

on: [push, pull_request, workflow_call]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install tox
        run: pip install tox

      - name: Run linters
        run: tox -e lint

  types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          micromamba-version: "latest"
          environment-name: grid-doctor
          cache-environment: true
          create-args: >-
            python=3.13
            pip
          condarc: |
            channels:
              - conda-forge
            channel_priority: strict
          init-shell: bash

      - name: Install packages
        shell: bash -l {0}
        run: |
          python -m pip install -e .[dev]
          pip install tox

      - name: Run type checker
        shell: bash -l {0}
        run: tox -e types

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          micromamba-version: "latest"
          environment-name: grid-doctor
          cache-environment: true
          create-args: >-
            python=3.13
            pip
          condarc: |
            channels:
              - conda-forge
            channel_priority: strict
          init-shell: bash

      - name: Install packages
        shell: bash -l {0}
        run: |
          python -m pip install -e .[dev]
          pip install tox

      - name: Build docs (strict)
        shell: bash -l {0}
        run: tox -e docs

  tests:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          micromamba-version: "latest"
          environment-name: grid-doctor
          cache-environment: true
          create-args: >-
            python=${{ matrix.python-version }}
            gdal
            rasterio
            h5py
            h5netcdf
            hdf5
            netcdf4
            pip
            cfgrib
            xarray
            cffi
          condarc: |
            channels:
              - conda-forge
            channel_priority: strict
          init-shell: bash

      - name: Install Python packages
        shell: bash -l {0}
        run: python -m pip install -e .[dev]

      - name: Run tests
        shell: bash -l {0}
        run: tox -e test
